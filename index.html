<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Light of Life</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(circle at top, #163a7a, #0a1f44);
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: #FFD700;
    }

    p {
      font-size: 1.2rem;
      opacity: 0.9;
      max-width: 500px;
      margin: 0 auto 30px;
    }

    .btn {
      display: inline-block;
      padding: 15px 30px;
      margin: 10px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-primary {
      background: #FFD700;
      color: #0a1f44;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
    }

    .btn-primary:hover {
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
      transform: scale(1.08);
    }

    .btn-secondary {
      border: 2px solid #FFD700;
      color: #FFD700;
    }

    .btn-secondary:hover {
      background: #FFD700;
      color: #0a1f44;
    }

    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 20px;
      margin-top: 40px;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }

    .verse {
      font-style: italic;
      opacity: 0.8;
    }

    footer {
      margin-top: 60px;
      font-size: 0.8rem;
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Light of Life 🙏✨</h1>

    <p>
      Find peace, strength, and connect with God every day through powerful prayers.
    </p>

    <a class="btn btn-primary" href="#">
      📲 Download App
    </a>

    <a class="btn btn-secondary" href="/genesis-2-2">
      📖 Read Today's Verse
    </a>

    <div class="card">
      <h3>Verse of the Day</h3>
      <p class="verse"></p>
    </div>

    <footer>
      © 2026 Light of Life — Faith • Peace • Strength
    </footer>

  </div>

  <script>
    const verses = [
      "The Lord is my shepherd; I shall not want.",
      "I can do all things through Christ who strengthens me.",
      "Be still, and know that I am God.",
      "The Lord bless you and keep you; the Lord make His face shine upon you.",
      "Trust in the Lord with all your heart."
    ];

    document.querySelector('.verse').innerText =
      verses[Math.floor(Math.random() * verses.length)];
  </script>

</body>
</html>
