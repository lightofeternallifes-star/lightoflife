<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light of Life | Christian Prayer App</title>
  <meta name="description" content="Light of Life is your daily Christian companion. Pray, read scripture, and share Bible verses." />
  <meta name="apple-itunes-app" content="app-id=6757895800" />
  <meta property="og:title" content="Light of Life | Christian Prayer App" />
  <meta property="og:description" content="Your daily Christian companion. Pray, read scripture, and share Bible verses." />
  <meta property="og:image" content="https://lightoflife.app/icon.png" />
  <meta property="og:url" content="https://lightoflife.app" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
 
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #07152b;
      --navy-light: #0d2040;
      --navy-card: #0f2645;
      --gold: #d4a84f;
      --gold-light: #e8c070;
      --gold-dark: #b8922a;
      --blue: #1b5cb8;
      --blue-light: #2470e0;
      --white: #ffffff;
      --white-70: rgba(255,255,255,0.7);
      --white-30: rgba(255,255,255,0.3);
      --white-10: rgba(255,255,255,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      background: var(--navy);
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* LANGUAGE SELECTOR */
    .language-selector {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      gap: 8px;
      background: rgba(15, 38, 69, 0.8);
      border: 1px solid rgba(212, 168, 79, 0.3);
      border-radius: 12px;
      padding: 8px;
      backdrop-filter: blur(10px);
    }

    .lang-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--white-70);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .lang-btn.active {
      background: var(--gold);
      color: #000;
    }

    .lang-btn:hover {
      color: var(--white);
    }

    /* HERO */
    .hero {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 60px;
      padding: 80px 20px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    .hero-copy {
      max-width: 520px;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 1.2;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .hero-sub {
      font-size: 18px;
      color: var(--white-70);
      margin-bottom: 30px;
    }

    .hero-phone-real img {
      width: 360px;
      border-radius: 30px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5);
    }

    .cta-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-phone-real img {
        width: 300px;
        margin-top: 30px;
      }
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,168,79,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(27,92,184,0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(212,168,79,0.06) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .app-icon {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      margin-bottom: 28px;
      box-shadow: 0 20px 60px rgba(212,168,79,0.3), 0 0 0 1px rgba(212,168,79,0.2);
      position: relative;
      z-index: 1;
      background: linear-gradient(135deg, #0a1f3d, #1a3a6e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--white-10);
      border: 1px solid rgba(212,168,79,0.3);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--gold);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .hero h1 {
      font-size: clamp(36px, 8vw, 64px);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .hero h1 span {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(16px, 3vw, 20px);
      color: var(--white-70);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 44px;
      position: relative;
      z-index: 1;
    }

    .cta-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--gold), var(--gold-dark));
      color: #000;
      font-weight: 700;
      font-size: 17px;
      padding: 18px 28px;
      border-radius: 16px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(212,168,79,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
      letter-spacing: -0.2px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(212,168,79,0.45);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: var(--white-10);
      color: var(--white);
      font-weight: 600;
      font-size: 16px;
      padding: 16px 28px;
      border-radius: 16px;
      text-decoration: none;
      border: 1px solid var(--white-30);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      backdrop-filter: blur(10px);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.5);
    }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: rgba(37,211,102,0.12);
      color: #25d366;
      font-weight: 600;
      font-size: 16px;
      padding: 16px 28px;
      border-radius: 16px;
      text-decoration: none;
      border: 1px solid rgba(37,211,102,0.25);
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-whatsapp:hover { background: rgba(37,211,102,0.2); }

    /* FEATURES */
    .features {
      padding: 80px 24px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
      text-align: center;
    }

    .section-title {
      font-size: clamp(28px, 5vw, 42px);
      font-weight: 700;
      text-align: center;
      margin-bottom: 48px;
      letter-spacing: -0.5px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .feature-card {
      background: var(--navy-card);
      border: 1px solid var(--white-10);
      border-radius: 20px;
      padding: 28px 24px;
      transition: border-color 0.2s, transform 0.2s;
    }

    .feature-card:hover {
      border-color: rgba(212,168,79,0.3);
      transform: translateY(-4px);
    }

    .feature-icon {
      font-size: 36px;
      margin-bottom: 16px;
    }

    .feature-card h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .feature-card p {
      font-size: 14px;
      color: var(--white-70);
      line-height: 1.6;
    }

    /* DIVIDER */
    .divider {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--white-30), transparent);
    }

    /* YOUTUBE */
    .youtube-section {
      padding: 80px 24px;
      text-align: center;
      max-width: 600px;
      margin: 0 auto;
    }

    .youtube-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    .btn-youtube {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--navy-card);
      border: 1px solid var(--white-10);
      border-radius: 14px;
      padding: 16px 24px;
      color: var(--white);
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-youtube:hover {
      border-color: rgba(255,0,0,0.4);
      background: rgba(255,0,0,0.06);
    }

    .yt-icon {
      color: #ff0000;
      font-size: 20px;
    }

    /* SHARE */
    .share-section {
      padding: 0 24px 80px;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    .share-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 32px;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--white-10);
      padding: 40px 24px;
      text-align: center;
    }

    .footer-logo {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .footer-logo span {
      color: var(--gold);
    }

    .footer-sub {
      font-size: 14px;
      color: var(--white-70);
      margin-bottom: 20px;
    }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .footer-links a {
      font-size: 14px;
      color: var(--white-70);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover { color: var(--gold); }

    .footer-copy {
      margin-top: 24px;
      font-size: 12px;
      color: rgba(255,255,255,0.35);
    }

    @media (max-width: 480px) {
      .features-grid { grid-template-columns: 1fr; }
    }

    .feature-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 90px 20px;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 56px;
      align-items: center;
    }

    .feature-copy {
      max-width: 540px;
    }

    .feature-title {
      font-size: 48px;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 18px;
      letter-spacing: 2px;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .feature-title::after {
      content: "";
      display: block;
      width: 80px;
      height: 3px;
      background: var(--gold);
      margin-top: 10px;
      border-radius: 2px;
    }

    .feature-copy h2 {
      font-size: 42px;
      line-height: 1.15;
      margin-bottom: 20px;
      color: var(--white);
    }

    .feature-copy p {
      font-size: 18px;
      line-height: 1.8;
      color: var(--white-70);
      margin-bottom: 24px;
    }

    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    .feature-list li {
      color: var(--white);
      font-size: 16px;
      line-height: 1.6;
      padding-left: 18px;
      position: relative;
    }

    .feature-list li::before {
      content: "•";
      color: var(--gold);
      position: absolute;
      left: 0;
    }

    .feature-cta {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .feature-cta .btn-primary,
    .feature-cta .btn-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 24px;
      border-radius: 10px;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .feature-cta .btn-primary {
      background: var(--gold);
      color: #000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .feature-cta .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }

    .feature-cta .btn-secondary {
      background: transparent;
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.2);
    }

    .feature-cta .btn-secondary:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.06);
    }

    .feature-shot {
      display: flex;
      justify-content: center;
    }

    .feature-shot img {
      width: 100%;
      max-width: 360px;
      border-radius: 30px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    .feature-section.alt .feature-grid {
      grid-template-columns: 1fr 1fr;
    }

    .feature-section.alt .feature-copy {
      order: 2;
    }

    .feature-section.alt .feature-shot {
      order: 1;
    }

    @media (max-width: 900px) {
      .feature-grid {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .feature-copy {
        max-width: 100%;
      }

      .feature-list li {
        padding-left: 0;
      }

      .feature-list li::before {
        display: none;
      }

      .feature-shot img {
        max-width: 300px;
      }

      .feature-cta {
        justify-content: center;
      }

      .feature-section.alt .feature-copy,
      .feature-section.alt .feature-shot {
        order: unset;
      }
    }
    @media (max-width: 768px) {
       .feature-grid {
         grid-template-columns: 1fr !important;
         gap: 28px;
         text-align: center;
      }

  .feature-shot,
  .feature-visual {
    order: 1 !important;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    margin-bottom: 8px;
  }

  .feature-copy,
  .feature-content {
    order: 2 !important;
    max-width: 100%;
  }

  .feature-shot img,
  .feature-visual img {
    display: block;
    width: 100%;
    max-width: 320px;
    height: auto;
    margin: 0 auto;
  }

  .feature-title {
    font-size: 44px;
    line-height: 1.05;
  }

  .feature-copy h2,
  .feature-content h2 {
    font-size: 28px;
    line-height: 1.15;
  }

  .feature-copy p,
  .feature-content p {
    font-size: 16px;
    line-height: 1.7;
  }

  .feature-list {
    gap: 10px;
  }

  .feature-list li {
    padding-left: 0;
  }

  .feature-list li::before {
    display: none;
  }

  .feature-cta {
    justify-content: center;
  }

  .feature-section.alt .feature-copy,
  .feature-section.alt .feature-shot,
  .feature-section.alt .feature-visual {
    order: unset;
  }

  .feature-section.alt .feature-shot,
  .feature-section.alt .feature-visual {
    order: 1 !important;
  }

  .feature-section.alt .feature-copy {
    order: 2 !important;
  }
}
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <!-- LANGUAGE SELECTOR -->
  <div class="language-selector">
    <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
    <button class="lang-btn" onclick="setLanguage('es')">ES</button>
    <button class="lang-btn" onclick="setLanguage('pt')">PT</button>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-glow"></div>

    <div class="hero-copy">
      <div class="badge">
        <span class="badge-dot"></span>
        <span data-en="Available on App Store" data-es="Disponible en App Store" data-pt="Disponível na App Store"></span>
      </div>

      <h1>
        <span data-en="Find peace, Community Aid and answers in one place." data-es="Encuentra paz, Ayuda Comunitaria y respuesta en un solo lugar." data-pt="Encontre paz, Ajuda Comunitária e respostas em um único lugar."></span>
      </h1>

      <p class="hero-sub" data-en="Light of Life is your daily spiritual guide. Pray, listen, learn and find Community Aid, Bible, AI Spiritual Counselor and tools designed to accompany you every day." data-es="Light of Life es tu guía espiritual diaria. Ora, escucha, aprende y encuentra Ayuda Comunitaria, Biblia, Consejero Espiritual IA y herramientas pensadas para acompañarte cada día." data-pt="Light of Life é seu guia espiritual diário. Ore, ouça, aprenda e encontre Ajuda Comunitária, Bíblia, Conselheiro Espiritual com IA e ferramentas projetadas para acompanhá-lo todos os dias."></p>

      <div class="cta-group">
        <a class="btn-primary" href="https://apps.apple.com/us/app/light-of-life-christian-prayer/id6757895800?l=es-MX" target="_blank">
          <span data-en="Download on the App Store" data-es="Descargar en la App Store" data-pt="Baixar na App Store"></span>
        </a>

        <a class="btn-secondary" href="https://lightoflife.app/verse/john/3/16">
          <span data-en="Read Today's Verse" data-es="Leer versículo de hoy" data-pt="Ler versículo de hoje"></span>
        </a>

        <button class="btn-whatsapp" onclick="shareApp()">
          <span data-en="Share App on WhatsApp" data-es="Compartir app en WhatsApp" data-pt="Compartilhar app no WhatsApp"></span>
        </button>

        <button class="btn-primary" id="sharePageBtn" onclick="sharePage()">
          <span data-en="Share this page" data-es="Compartir esta página" data-pt="Compartilhar esta página"></span>
        </button>
      </div>
    </div>

    <div class="hero-phone-real">
      <img src="/screenshots/en/home-main-en.png" alt="Light of Life Home Screen" />
    </div>
  </section>

  <!-- COMMUNITY AID -->
  <section class="feature-section alt">
    <div class="feature-grid">
      <div class="feature-copy">
        <div class="feature-cta">
          <a class="btn-primary" href="https://apps.apple.com/us/app/light-of-life-christian-prayer/id6757895800" target="_blank">
            🙏 <span data-en="Explore available help" data-es="Explorar ayuda disponible" data-pt="Explorar ajuda disponível"></span>
          </a>
        </div>
        <h3 class="feature-title" data-en="Community Aid" data-es="Ayuda Comunitaria" data-pt="Ajuda Comunitária"></h3>
        <h2 data-en="Find real help in your most difficult moment" data-es="Encuentra ayuda real en tu momento más difícil" data-pt="Encontre ajuda real em seu momento mais difícil"></h2>
        <p data-en="This section connects people with concrete help in their community. It doesn't just inspire: it also guides towards food, clothing, nearby support and real resources for difficult times." data-es="Esta sección conecta a las personas con ayuda concreta en su comunidad. No solo inspira: también orienta hacia comida, ropa, apoyo cercano y recursos reales para momentos difíciles." data-pt="Esta seção conecta pessoas com ajuda concreta em sua comunidade. Não apenas inspira: também orienta para alimentos, roupas, apoio próximo e recursos reais para momentos difíceis."></p>

        <ul class="feature-list">
          <li data-en="Find help near you" data-es="Encuentra ayuda cerca de ti" data-pt="Encontre ajuda perto de você"></li>
          <li data-en="Access real and useful resources" data-es="Accede a recursos reales y útiles" data-pt="Acesse recursos reais e úteis"></li>
          <li data-en="Receive support with a clear experience" data-es="Recibe apoyo con una experiencia clara" data-pt="Receba suporte com uma experiência clara"></li>
          <li data-en="Connect faith with concrete action" data-es="Conecta fe con acción concreta" data-pt="Conecte fé com ação concreta"></li>
        </ul>
        <div class="feature-cta">
          <a class="btn-primary" href="https://apps.apple.com/us/app/light-of-life-christian-prayer/id6757895800" target="_blank">
            🆘 <span data-en="Urgent help" data-es="Ayuda urgente" data-pt="Ajuda urgente"></span>
          </a>
        </div>
      </div>

      <div class="feature-shot">
        <img src="/screenshots/en/community-aid-en.png" alt="Community Aid Screen" />
      </div>
    </div>
  </section>

  <!-- WORD OF GOD -->
  <section class="feature-section">
    <div class="feature-grid">
      <div class="feature-copy">

  <script>
    const APP_STORE = "https://apps.apple.com/us/app/light-of-life-christian-prayer/id6757895800";
    let currentLanguage = 'en';

    function setLanguage(lang) {
      currentLanguage = lang;
      localStorage.setItem('language', lang);
      
      // Update active button
      document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      
      // Update all elements with data attributes
      document.querySelectorAll('[data-en]').forEach(el => {
        const key = `data-${lang}`;
        if (el.hasAttribute(key)) {
          if (el.tagName === 'A' || el.tagName === 'BUTTON') {
            el.textContent = el.getAttribute(key);
          } else {
            el.textContent = el.getAttribute(key);
          }
        }
      });
    }

    // Load saved language
    const savedLanguage = localStorage.getItem('language') || 'en';
    currentLanguage = savedLanguage;
    
    // Apply language on load
    window.addEventListener('load', () => {
      document.querySelectorAll('[data-en]').forEach(el => {
        const key = `data-${savedLanguage}`;
        if (el.hasAttribute(key)) {
          el.textContent = el.getAttribute(key);
        }
      });
      
      // Update active button
      if (savedLanguage !== 'en') {
        document.querySelectorAll('.lang-btn').forEach((btn, idx) => {
          btn.classList.remove('active');
          if ((savedLanguage === 'es' && idx === 1) || (savedLanguage === 'pt' && idx === 2)) {
            btn.classList.add('active');
          }
        });
      }
    });

    function parseSlug() {
      const path = window.location.pathname.replace("/", "");
      if (!path) return null;
      const parts = path.split("-");
      if (parts.length < 3) return null;
      const verse = parts.pop();
      const chapter = parts.pop();
      const book = parts.join("-");
      return { book, chapter, verse };
    }

    function openApp() {
      const data = parseSlug();
      if (!data) return;
      const deepLink = `lightoflife://verse/${data.book}/${data.chapter}/${data.verse}`;
      window.location.href = deepLink;
      setTimeout(() => { window.location.href = APP_STORE; }, 1500);
    }

    if (window.location.pathname !== "/") { openApp(); }

    function shareVerse() {
      const path = window.location.pathname === "/" ? "genesis-1-1" : window.location.pathname.replace("/", "");
      const link = "https://lightoflife.app/" + path;
      const messages = {
        en: "📖 Read this Bible verse\n\n" + link + "\n\n🙏 Light of Life App",
        es: "📖 Lee este versículo bíblico\n\n" + link + "\n\n🙏 Aplicación Light of Life",
        pt: "📖 Leia este versículo bíblico\n\n" + link + "\n\n🙏 App Light of Life"
      };
      const msg = messages[currentLanguage] || messages.en;
      window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
    }

    function shareApp() {
      const messages = {
        en: "🙏 Light of Life App\n\nDaily prayer & Bible\n\nDownload:\n" + APP_STORE,
        es: "🙏 Aplicación Light of Life\n\nOración diaria y Biblia\n\nDescargar:\n" + APP_STORE,
        pt: "🙏 App Light of Life\n\nOração diária e Bíblia\n\nBaixar:\n" + APP_STORE
      };
      const msg = messages[currentLanguage] || messages.en;
      window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
    }

    function sharePage() {
      const url = window.location.href;
      const titles = {
        en: "Light of Life - Daily prayer & Bible verses",
        es: "Light of Life - Oración diaria y versículos bíblicos",
        pt: "Light of Life - Oração diária e versículos bíblicos"
      };
      const title = titles[currentLanguage] || titles.en;
      
      if (navigator.share) {
        navigator.share({
          title: title,
          text: "Check out this on Light of Life App",
          url: url
        }).catch(err => {
          intentarCopiarAlPortapapeles(url);
        });
        return;
      }
      
      intentarCopiarAlPortapapeles(url);
    }

    function intentarCopiarAlPortapapeles(url) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById("sharePageBtn");
        const original = btn.querySelector('span').textContent;
        btn.querySelector('span').textContent = currentLanguage === 'en' ? '✓ Link copied' : currentLanguage === 'es' ? '✓ Enlace copiado' : '✓ Link copiado';
        setTimeout(() => {
          btn.querySelector('span').textContent = original;
        }, 2000);
      }).catch(err => {
        mostrarCopiaManual(url);
      });
    }

    function mostrarCopiaManual(url) {
      const messages = {
        en: "Copy this page link:\n\n(Cmd+C to copy)",
        es: "Copia este enlace de página:\n\n(Cmd+C para copiar)",
        pt: "Copie este link de página:\n\n(Cmd+C para copiar)"
      };
      prompt(messages[currentLanguage] || messages.en, url);
    }
  </script>
