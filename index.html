<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Light of Life | Christian Prayer App</title>

  <meta name="description" content="Light of Life is your daily Christian companion. Pray, read scripture, and share Bible verses." />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #07152b;
      color: white;
      text-align: center;
    }

    .container {
      padding: 40px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 20px;
    }

    .btn {
      display: block;
      margin: 12px auto;
      padding: 14px;
      border-radius: 10px;
      width: 90%;
      max-width: 400px;
      font-weight: bold;
      text-decoration: none;
      border: none;
      font-size: 16px;
    }

    .primary {
      background: #d4a84f;
      color: #000;
    }

    .blue {
      background: #1b5cb8;
      color: #fff;
    }

    .dark {
      background: #111;
      color: #fff;
      cursor: pointer;
    }

    .section {
      margin-top: 40px;
    }

    .small {
      color: #ccc;
      font-size: 14px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🙏 Light of Life</h1>
    <p>Your daily Christian companion</p>

    <a
      class="btn primary"
      href="https://apps.apple.com/us/app/light-of-life-christian-prayer/id6757895800"
      target="_blank"
    >
      📲 Download the App
    </a>

    <a
      class="btn blue"
      href="https://lightoflife.app/genesis-2-2"
    >
      📖 Read Today’s Verse
    </a>

    <button class="btn dark" onclick="shareVerse()">
      📲 Share Verse (WhatsApp)
    </button>

    <button class="btn dark" onclick="shareApp()">
      🚀 Share App (WhatsApp)
    </button>

    <div class="section">
      <h2>🎥 YouTube</h2>

      <a class="btn blue" href="https://www.youtube.com/@LightOfEternalLife" target="_blank">
        🇺🇸 English
      </a>

      <a class="btn blue" href="https://www.youtube.com/@LuzdeVidaEterna-c8r" target="_blank">
        🇪🇸 Español
      </a>

      <a class="btn blue" href="https://www.youtube.com/@LuzDeVidaEternaPT" target="_blank">
        🇧🇷 Português
      </a>
    </div>

    <div class="section">
      <h3>Contact</h3>
      <a class="small" href="mailto:lightofeternallifes@gmail.com">
        lightofeternallifes@gmail.com
      </a>
    </div>
  </div>

  <script>
    const APP_STORE =
      "https://apps.apple.com/us/app/light-of-life-christian-prayer/id6757895800";

    function parseSlug() {
      const path = window.location.pathname.replace("/", "");
      if (!path) return null;

      const parts = path.split("-");
      if (parts.length < 3) return null;

      const verse = parts.pop();
      const chapter = parts.pop();
      const book = parts.join("-");

      return { book, chapter, verse };
    }

    function openApp() {
      const data = parseSlug();
      if (!data) return;

      const deepLink = `lightoflife://verse/${data.book}/${data.chapter}/${data.verse}`;

      // intentar abrir app
      window.location.href = deepLink;

      // fallback si no abre
      setTimeout(() => {
        window.location.href = APP_STORE;
      }, 1500);
    }

    // 🔥 AUTO REDIRECT SI ES LINK DE VERSO
    if (window.location.pathname !== "/") {
      openApp();
    }

    function shareVerse() {
      const path = window.location.pathname === "/" ? "genesis-2-2" : window.location.pathname.replace("/", "");
      const link = "https://lightoflife.app/" + path;

      const msg =
        "📖 Read this Bible verse\n\n" +
        link + "\n\n" +
        "🙏 Light of Life App";

      window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
    }

    function shareApp() {
      const msg =
        "🙏 Light of Life App\n\n" +
        "Daily prayer & Bible\n\n" +
        "Download:\n" + APP_STORE;

      window.open("https://wa.me/?text=" + encodeURIComponent(msg), "_blank");
    }
  </script>
</body>
</html>
