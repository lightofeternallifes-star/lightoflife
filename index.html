<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Light of Life | Christian Prayer App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #07152b;
      --gold: #d4a84f;
      --gold-dark: #b8922a;
      --white: #ffffff;
      --white-70: rgba(255,255,255,0.7);
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', Arial, sans-serif; background: var(--navy); color: var(--white); min-height: 100vh; overflow-x: hidden; }
    .hero { display: flex; align-items: center; justify-content: space-between; gap: 60px; padding: 80px 20px; max-width: 1200px; margin: 0 auto; position: relative; }
    .hero-copy { max-width: 520px; }
    .hero h1 { font-size: 42px; line-height: 1.2; margin-bottom: 20px; font-weight: 700; }
    .hero-sub { font-size: 18px; color: var(--white-70); margin-bottom: 30px; }
    .hero-phone-real img { width: 360px; border-radius: 30px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
    .cta-group { display: flex; flex-direction: column; gap: 12px; }
    @media (max-width: 768px) { .hero { flex-direction: column; text-align: center; } .hero-phone-real img { width: 300px; margin-top: 30px; } }
    .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.08); border: 1px solid rgba(212,168,79,0.3); border-radius: 100px; padding: 6px 14px; font-size: 12px; color: var(--gold); text-transform: uppercase; margin-bottom: 20px; }
    .btn-primary { display: flex; align-items: center; justify-content: center; gap: 10px; background: linear-gradient(135deg, var(--gold), var(--gold-dark)); color: #000; font-weight: 700; padding: 18px 28px; border-radius: 16px; text-decoration: none; border: none; cursor: pointer; box-shadow: 0 8px 32px rgba(212,168,79,0.35); transition: transform 0.15s; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(212,168,79,0.45); }
    .feature-shot img { width: 100%; max-width: 360px; border-radius: 30px; box-shadow: 0 30px 80px rgba(0,0,0,0.45); }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-copy">
      <div class="badge">✓ Disponible en App Store</div>
      <h1>Encuentra paz, Ayuda Comunitaria y respuesta</h1>
      <p class="hero-sub">Light of Life es tu guía espiritual. Ora, escucha, aprende y encuentra todo lo que necesitas.</p>
      <div class="cta-group">
        <a class="btn-primary" href="https://apps.apple.com/us/app/light-of-life-christian-prayer/id6757895800" target="_blank">Descargar en App Store</a>
      </div>
    </div>
    <div class="hero-phone-real">
      <img src="/screenshots/en/home-main-en.png" alt="Home Screen" />
    </div>
  </section>
</body>
</html>
